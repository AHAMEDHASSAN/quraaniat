    <script>
        const adhkarData = [
            // Morning
            { type: 'morning', text: 'أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ لَا إِلَهَ إِلَّا اللهُ، وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ.', count: 1, virtue: 'من قالها حين يصبح كفي ما أهمه من أمر الدنيا والآخرة.' },
            { type: 'morning', text: 'اللَّهُمَّ بِكَ أَصْبَحْنَا وَبِكَ أَمْسَيْنَا، وَبِكَ نَحْيَا وَبِكَ نَمُوتُ وَإِلَيْكَ النُّشُورُ.', count: 1, virtue: '' },
            { type: 'morning', text: 'آية الكرسي: اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ...', count: 1, virtue: 'من قالها حين يصبح أجير من الجن حتى يمسي.' },
            { type: 'morning', text: 'سُبْحَانَ اللهِ وَبِحَمْدِهِ: عَدَدَ خَلْقِهِ، وَرِضَا نَفْسِهِ، وَزِنَةَ عَرْشِهِ، وَمِدَادَ كَلِمَاتِهِ.', count: 3, virtue: '' },

            // Evening
            { type: 'evening', text: 'أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ لَا إِلَهَ إِلَّا اللهُ، وَحْدَهُ لَا شَرِيكَ لَهُ.', count: 1, virtue: '' },
            { type: 'evening', text: 'اللَّهُمَّ بِكَ أَمْسَيْنَا وَبِكَ أَصْبَحْنَا، وَبِكَ نَحْيَا وَبِكَ نَمُوتُ وَإِلَيْكَ الْمَصِيرُ.', count: 1, virtue: '' },

            // Sleep
            { type: 'sleep', text: 'بِاسْمِكَ اللَّهُمَّ أَمُوتُ وَأَحْيَا.', count: 1, virtue: '' },
            { type: 'sleep', text: 'اللَّهُمَّ قِنِي عَذَابَكَ يَوْمَ تَبْعَثُ عِبَادَكَ.', count: 3, virtue: '' },

            // All/General
            { type: 'all', text: 'سُبْحَانَ اللهِ وَالْحَمْدُ لِلَّهِ وَلَا إِلَهَ إِلَّا اللهُ وَاللهُ أَكْبَرُ.', count: 100, virtue: 'أحب الكلام إلى الله.' },
            { type: 'all', text: 'أَسْتَغْفِرُ اللهَ وَأَتُوبُ إِلَيْهِ.', count: 100, virtue: '' },
        ];

        function setCategory(cat) {
            // Update UI
            document.querySelectorAll('.tab-btn').forEach(btn => {
                if (btn.dataset.cat === cat) {
                    btn.classList.add('bg-[#1B4332]', 'text-white', 'shadow-lg');
                    btn.classList.remove('text-gray-600', 'dark:text-white', 'hover:bg-gray-100', 'dark:hover:bg-white/10');
                } else {
                    btn.classList.remove('bg-[#1B4332]', 'text-white', 'shadow-lg');
                    btn.classList.add('text-gray-600', 'dark:text-white', 'hover:bg-gray-100', 'dark:hover:bg-white/10');
                }
            });

            // Filter Data
            const grid = document.getElementById('adhkarGrid');
            grid.innerHTML = '';

            const filtered = cat === 'all' ? adhkarData : adhkarData.filter(item => item.type === cat || item.type === 'all');

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="text-center py-10 text-gray-400">لا توجد أذكار في هذا القسم حالياً</div>';
                return;
            }

            filtered.forEach(zekr => {
                const div = document.createElement('div');
                div.className = 'bg-white dark:bg-white/5 p-6 rounded-2xl border border-[#e5e0d4] dark:border-white/10 shadow-sm adhkar-card transition-all duration-300 relative';

                div.innerHTML = `
                    <div class="mb-4">
                         <p class="font-amiri text-xl md:text-2xl leading-loose text-[#1B4332] dark:text-white font-bold text-center">${zekr.text}</p>
                    </div>
                    ${zekr.virtue ? `<div class="bg-amber-50 dark:bg-amber-500/10 rounded-lg p-3 text-sm text-amber-800 dark:text-amber-200 mb-4 text-center border border-amber-100 dark:border-amber-500/20">${zekr.virtue}</div>` : ''}
                    
                    <div class="flex items-center justify-center mt-4">
                        <button class="count-btn w-full py-2 bg-[#1B4332]/5 dark:bg-white/5 hover:bg-[#1B4332] dark:hover:bg-brand-gold hover:text-white dark:hover:text-brand-dark text-[#1B4332] dark:text-brand-gold font-bold rounded-xl transition-colors border border-[#1B4332]/10 dark:border-white/10" onclick="count(this, ${zekr.count})">
                            ${zekr.count} مرات
                        </button>
                    </div>
                `;
                grid.appendChild(div);
            });

            // Update Title
            const titles = { 'morning': 'أذكار الصباح', 'evening': 'أذكار المساء', 'sleep': 'أذكار النوم', 'all': 'الأذكار الشاملة' };
            document.getElementById('pageTitle').textContent = titles[cat] || 'حصن المسلم';
        }

        function count(btn, max) {
            let current = parseInt(btn.dataset.current || 0);
            current++;
            btn.dataset.current = current;

            if (current >= max) {
                btn.textContent = 'تم ✓';
                btn.classList.add('bg-green-600', 'text-white');
                btn.classList.remove('bg-[#1B4332]/5', 'text-[#1B4332]');
                btn.disabled = true;
            } else {
                btn.textContent = `${max - current} متبقي`;
            }
        }

        // On Load
        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type') || 'morning';
        setCategory(type);

    </script>
